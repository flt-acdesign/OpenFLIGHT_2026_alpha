<body>
    <input type="file" id="fileInput" accept=".glb" style="display: none;" />

    <!--
      Startup loading overlay. Visible from the moment the HTML is parsed so
      the user sees "Loading…" immediately — before Babylon, the scene, or
      the WebSocket handshake have had a chance to run. Hidden by the main
      render loop (6.1) once the simulation is ready to be unpaused:
      window.initialDataReceived === true AND !window.isGlbLoading.
      Shares the #glbLoadingOverlay id so 4.3_🔼_import_parameters_for_glb_aircraft.js
      can update its text to "Loading aircraft model (…)" during GLB upload.
    -->
    <div id="glbLoadingOverlay"
         style="position:fixed;top:0;left:0;width:100%;height:100%;
                background:rgba(0,0,0,0.78);color:#fff;
                display:flex;align-items:center;justify-content:center;
                font-family:'Segoe UI',Arial,sans-serif;font-size:22px;
                letter-spacing:0.5px;z-index:99999;pointer-events:none;">
        Loading…
    </div>

    <canvas id="renderCanvas"></canvas>
