# Per-aircraft render overrides for the Pilatus PC-21.
# See 4.3_🔼_import_parameters_for_glb_aircraft.js (GLB transform +
# lights + propeller) and 6.4_🎦_create_cameras.js (camera_positions)
# for what each key does.  Omit any key or section to fall back to the
# built-in default.
#
# Body-frame convention: x toward the tail from CoG, y up from CoG,
# z toward the right wing from CoG.  All distances are METERS and all
# angles are DEGREES.

glb_transform:
  rotation_deg:  {x: 0, y: 0, z: 0}
  translation_m: {x: -0.20, y: 0, z: 0}
  scale: 1

lights:
  wing_tip_position: [-1.1,  0.0,   4.55]    # starboard wing tip; port is mirrored on z
  tailcone_position: [-6.97, 0.55,  0]
  strobe_position:   [-3.16, 1.015, 0]

propeller:
  position:   [3.35, -0.2, 0]   # body-frame offset from CoG, meters
  diameter_m: 2.68               # tip-to-tip diameter, meters

# Per-camera position AND visibility flags.
#
# `render_aircraft`  — show/hide the aircraft body (GLB mesh, or the
#                      parametric planeNode if no GLB is loaded).
# `render_propeller` — show/hide the propellerPivot from this camera.
#                      The yaml's `propeller:` section still decides
#                      whether a propeller exists at all; this flag
#                      only masks the view — it can hide but not conjure.
#
# Defaults if either flag is omitted:
#   cockpit → render_aircraft=false (see out of the cockpit, not through
#             the fuselage), render_propeller=true (spinning disc
#             ahead of the pilot).
#   wing / orbital / chase → both true.
camera_positions:
  cockpit:
    x: 0.5
    y: 1.0
    z: 0.0
    yaw_deg: 90
    pitch_deg: 0
    roll_deg: 0
    render_aircraft: false
    render_propeller: true
  wing:
    x: -1
    y: 0.5
    z: -4.2
    yaw_deg: -3
    pitch_deg: 0
    roll_deg: -5
    render_aircraft: true
    render_propeller: true
